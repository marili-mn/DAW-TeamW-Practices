worker_processes 1;

error_log logs/error.log;
pid       logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;
    sendfile     on;

    access_log logs/access.log;

    client_body_temp_path temp/client_body;
    proxy_temp_path       temp/proxy;
    fastcgi_temp_path     temp/fastcgi;
    uwsgi_temp_path       temp/uwsgi;
    scgi_temp_path        temp/scgi;

    server {
        listen      8080;
        server_name localhost;

        root  ../frontend/dist/frontend/browser;
        index index.html;

        # API -> backend NestJS (PM2)
        location /api/ {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Assets con hash (Angular les pone hash en el nombre): cacheables eternamente.
        location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # index.html: jamas cachear. Sin esto, el browser ve la version vieja
        # y pide chunks JS con hash que ya no existen -> app rota.
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;
        }

        # SPA Angular: cualquier ruta no encontrada cae en index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

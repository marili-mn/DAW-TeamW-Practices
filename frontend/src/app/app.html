<p-toast position="top-right" />
<p-confirmdialog [style]="{ width: '24rem' }" [breakpoints]="{ '640px': '92vw' }" />

@if (auth.loggedIn()) {
  <header class="topbar">
    <span class="brand"><i class="pi pi-briefcase"></i> Gestión de Proyectos</span>
    <nav>
      <a routerLink="/proyectos" routerLinkActive="activo">
        <i class="pi pi-folder"></i><span>Proyectos</span>
      </a>
      <a routerLink="/clientes" routerLinkActive="activo">
        <i class="pi pi-users"></i><span>Clientes</span>
      </a>
      <a routerLink="/estadisticas" routerLinkActive="activo">
        <i class="pi pi-chart-bar"></i><span>Estadísticas</span>
      </a>
      @if (auth.esAdmin()) {
        <a routerLink="/historial" routerLinkActive="activo">
          <i class="pi pi-history"></i><span>Historial</span>
        </a>
        <a routerLink="/usuarios" routerLinkActive="activo">
          <i class="pi pi-user"></i><span>Usuarios</span>
        </a>
      }
    </nav>
    <span class="usuario-actual">
      <i class="pi pi-user"></i> {{ auth.nombre() }}
      <span class="rol-chip" [class.rol-admin]="auth.esAdmin()">{{ auth.rol() }}</span>
    </span>
    <p-button
      label="Salir"
      icon="pi pi-sign-out"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="salir()"
    />
  </header>
}

<main class="contenido">
  <router-outlet />
</main>

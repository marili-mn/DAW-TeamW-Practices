<div class="page-header">
  <h2>Historial de cambios</h2>
</div>

<div class="tabla-card">
  <p-table
    [value]="registros()"
    [loading]="cargando()"
    [paginator]="registros().length > 15"
    [rows]="15"
    [rowHover]="true"
    [tableStyle]="{ 'min-width': '40rem' }"
  >
    <ng-template #header>
      <tr>
        <th style="width: 13rem">Fecha</th>
        <th>Usuario</th>
        <th>Entidad</th>
        <th>Acción</th>
        <th>Registro #</th>
      </tr>
    </ng-template>
    <ng-template #body let-r>
      <tr>
        <td>{{ r.fecha | date: 'dd/MM/yyyy HH:mm:ss' }}</td>
        <td>{{ r.usuario }}</td>
        <td>{{ r.entidad }}</td>
        <td><p-tag [value]="r.accion" [severity]="severidad(r.accion)" /></td>
        <td>{{ r.entidadId ?? '—' }}</td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="5">
          <div class="estado-vacio">
            <i class="pi pi-history"></i>
            <p>Todavía no hay cambios registrados.</p>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
